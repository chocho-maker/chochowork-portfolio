<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>말, 한 줄로 충분한</title>
<style>
@font-face {
  font-family: 'SFMono';
  src: url('SFMonoLight.otf') format('opentype');
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'SFMono', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.6;
  color: #1a1a1a;
  background: #f6f6f4;
  -webkit-font-smoothing: antialiased;
}
nav {
  padding: 18px 40px;
  background: #fff;
  border-bottom: 1px solid #e2e2df;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 10;
}
nav .n-l { font-weight: 600; }
nav .n-r { color: #888; }
.proj-row {
  display: grid;
  grid-template-columns: 200px 280px 1fr;
  background: #fff;
  border-bottom: 1px solid #e2e2df;
  min-height: 400px;
}
.pc-title { padding: 40px; border-right: 1px solid #e2e2df; }
.p-num { color: #888; margin-bottom: 8px; }
.p-name { font-weight: 600; line-height: 1.4; }
.pc-text { padding: 40px; border-right: 1px solid #e2e2df; }
.meta { color: #888; margin-bottom: 24px; }
.meta p { line-height: 1.9; }
.lead { font-style: italic; margin-bottom: 16px; }
.bd { margin-bottom: 24px; }
.pc-media { padding: 40px; background: #f6f6f4; }
.m-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.m-item img, .m-item video {
  width: 100%;
  display: block;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  background: #ddd;
}
.m-item.wide { grid-column: 1 / -1; }
.m-cap { margin-top: 8px; color: #888; }
footer {
  padding: 28px 40px;
  display: flex;
  justify-content: space-between;
  color: #888;
  background: #fff;
  border-top: 1px solid #e2e2df;
}

</style>
</head>
<body>

<nav>
  <span class="n-l">말, 한 줄로 충분한</span>
  <span class="n-r">Portfolio 2025</span>
</nav>
<div class="proj-row">
  <div class="pc-title">
    <div class="p-num">01</div>
    <div class="p-name">말, 한 줄로 충분한</div>
  </div>
  <div class="pc-text">
    <div class="meta">
      <p>비공개</p>
      <p>Brand Copywriting</p>
      <p>2025</p>
    </div>
    <p class="lead">브랜드의 본질을 한 문장으로 압축했습니다.</p>
    <p class="bd">불필요한 것을 덜어내고, 꼭 필요한 말만 남겼습니다. 언어가 가장 단단해지는 순간은 가장 적어질 때입니다.</p>
  </div>
  <div class="pc-media">
    <div class="m-grid">
        <div class="m-item">
        <img src="스크린샷 2026-06-22 오후 2.10.16.png" alt="스크린샷 2026-06-22 오후 2.10.16.png" loading="lazy" />
        <div class="m-cap">1<br>스크린샷 2026-06-22 오후 2.10.16.png</div>
      </div>
    </div>
  </div>
</div>
<footer>
  <span>말, 한 줄로 충분한</span>
  <span>Portfolio 2025</span>
</footer>
</body>
</html>
